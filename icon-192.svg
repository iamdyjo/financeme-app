<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2942"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#10b981" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="96" cy="96" r="70" fill="url(#glow)"/>
  <!-- Coin -->
  <circle cx="96" cy="96" r="52" fill="#0f2a1e" stroke="#10b981" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="96" cy="96" r="46" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <!-- Rp symbol -->
  <text x="96" y="108" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="42" font-weight="800" fill="#10b981">Rp</text>
</svg>
